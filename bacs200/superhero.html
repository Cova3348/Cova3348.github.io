<!DOCTYPE html>
<html lang="en-US">
	<head>
		<meta charset="utf-8">
		<title>We fs winning team</title>
		<style>				
			caption
			{
				text-decoration:underline;
				font-size:28px;
			}
            th
            {
                width:200px;
                font-size:20px;
            }
            th,td
            {
                border:1px solid black;
                padding-left:10px;
                padding-right:10px;
                padding-top:10px;
                padding-bottom:10px;
            }
            table
            {
                border-spacing:0px;
            }
		</style>
	</head>
	<body>
		<table>
			<caption>We fs winning team</caption>
			<tbody>
				<tr>
					<th scope="col">Name</th>
					<th scope="col">Alias</th>
					<th scope="col">Image</th>
					<th scope="col">Superpower(s)</th>
					<th scope="col">Weakness(es)</th>
				</tr>
				<tr>
					<th scope="row">Superman</th>
					<td>Clark Kent</td>
					<td style="text-align:center;">
						<a href="bacs200/images/superman.jpg">
							<img alt="Superman" src="images.superman.jpg" height="100">
						</a>
					</td>
					<td style="text-align:center;">
					<td>
						<ul>
							<li>
								::marker
								"Fly"
							</li>
							<li>
								::marker
								"Super Strength"
							</li>
							<li>
								::marker
								"Invulnerability"
							</li>
						</ul>
					</td>
					<td>Kryptonite</td>
				</tr>
	</body>
</html>
